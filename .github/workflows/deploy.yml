name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 216.48.181.48
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: /opt/api-insights-frontend/deploy.sh
