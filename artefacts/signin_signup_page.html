<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>API Insights – Auth</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #1e2535;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    .bg-canvas { position: fixed; inset: 0; z-index: 0; }
    #sq-canvas  { position: absolute; width: 100%; height: 100%; }

    .page { position: relative; z-index: 1; }
    .page { display: none; width: 100%; flex-direction: column; align-items: center; justify-content: center; }
    .page.active { display: flex; }

    /* ── Card ── */
    .card {
      background: #252d3d;
      border-radius: 20px;
      padding: 38px 40px 34px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.04) inset;
    }

    /* ── Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 22px;
    }
    .brand-name {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      display: block;
    }
    .brand-tagline {
      font-size: 13px;
      color: #7a8696;
      margin-top: 6px;
    }
    .brand-name span.gap { letter-spacing: 6px; }
    .brand-name span.insights {
      background: linear-gradient(270deg, #ff9a6c, #ff5c38, #ff3d6e, #ff7a50, #ff9a6c);
      background-size: 300% 300%;
      animation: fluidGrad 4s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Header ── */
    .card-header { text-align: center; margin-bottom: 28px; }
    .card-header h1 {
      font-size: 26px; font-weight: 700; color: #fff;
      letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 6px;
    }
    .card-header p { font-size: 13.5px; color: #7a8696; }

    /* ── Social buttons — side by side, same height as inputs ── */
    .social-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .social-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 13px;
      background: #1a2030;
      border: 1.5px solid #2a3245;
      border-radius: 10px;
      color: #c8d0dc;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
      white-space: nowrap;
    }
    .social-btn:hover { background: #1f2840; border-color: #3a4560; }
    .g-icon { width: 17px; height: 17px; flex-shrink: 0; }

    /* ── Divider ── */
    .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #2e3748; }
    .divider span { font-size: 12px; color: #4a5568; white-space: nowrap; }

    /* ── Fields ── */
    .fields { margin-bottom: 22px; }
    .field  { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 7px;
    }
    .field-label label { font-size: 13px; font-weight: 600; color: #c8d0dc; }

    /* Orange anchor links — no gradient, no animation */
    .forgot-link, .switch-link {
      color: #ff6a42;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.18s;
    }
    .forgot-link { font-size: 12.5px; font-weight: 500; }
    .forgot-link:hover, .switch-link:hover { color: #ffaa80; }

    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-icon {
      position: absolute; left: 13px;
      color: #4a5568; display: flex; align-items: center; pointer-events: none;
    }
    .input-wrapper input {
      width: 100%;
      padding: 12px 13px 12px 40px;
      background: #1a2030;
      border: 1.5px solid #2a3245;
      border-radius: 10px;
      color: #e8edf4;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; outline: none;
      transition: border-color 0.18s;
    }
    .input-wrapper input::placeholder { color: #4a5568; }
    .input-wrapper input:focus { border-color: #ff6a42; }

    .eye-btn {
      position: absolute; right: 13px;
      background: none; border: none; color: #4a5568;
      cursor: pointer; display: flex; align-items: center; padding: 0;
      transition: color 0.18s;
    }
    .eye-btn:hover { color: #7a8696; }

    /* ── CTA ── */
    @keyframes fluidGrad {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .cta-btn {
      width: 100%; padding: 14px 20px;
      background: linear-gradient(270deg, #ff9a6c, #ff5c38, #ff3d6e, #ff7a50, #ff9a6c);
      background-size: 300% 300%;
      animation: fluidGrad 4s ease infinite;
      border: none; border-radius: 10px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.18s, transform 0.12s;
      box-shadow: 0 8px 28px rgba(255,80,50,0.35);
    }
    .cta-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .cta-btn:active { transform: translateY(0); }

    /* ── Switch ── */
    .switch-text { text-align: center; margin-top: 20px; font-size: 13.5px; color: #5a6478; }
    .switch-link { margin-left: 3px; }

    /* ── Footer ── */
    .footer-links { display: flex; gap: 20px; margin-top: 18px; }
    .footer-links a { font-size: 12px; color: #3a4560; text-decoration: none; transition: color 0.18s; }
    .footer-links a:hover { color: #7a8696; }

    /* ── Country code dropdown ── */
    .phone-row { display: flex; gap: 8px; }

    .country-select-wrapper {
      position: relative;
      flex-shrink: 0;
    }
    .country-trigger {
      display: flex; align-items: center; gap: 6px;
      padding: 12px 10px 12px 13px;
      background: #1a2030;
      border: 1.5px solid #2a3245;
      border-radius: 10px;
      color: #e8edf4;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: border-color 0.18s;
      white-space: nowrap;
      min-width: 96px;
      user-select: none;
    }
    .country-trigger:hover, .country-trigger.open { border-color: #ff6a42; }
    .country-trigger .flag { font-size: 17px; line-height: 1; }
    .country-trigger .code { color: #c8d0dc; }
    .country-trigger .chevron {
      margin-left: auto;
      color: #4a5568; font-size: 10px;
      transition: transform 0.18s;
    }
    .country-trigger.open .chevron { transform: rotate(180deg); }

    .country-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      width: 240px;
      max-height: 220px;
      overflow-y: auto;
      background: #1e2738;
      border: 1.5px solid #2e3a52;
      border-radius: 12px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.5);
      z-index: 100;
      padding: 6px 0;
    }
    .country-dropdown.open { display: block; }
    .country-dropdown::-webkit-scrollbar { width: 4px; }
    .country-dropdown::-webkit-scrollbar-track { background: transparent; }
    .country-dropdown::-webkit-scrollbar-thumb { background: #3a4560; border-radius: 4px; }

    .country-search {
      width: 100%; padding: 8px 12px;
      background: #252e42;
      border: none; border-bottom: 1px solid #2e3a52;
      border-radius: 0;
      color: #e8edf4;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; outline: none;
    }
    .country-search::placeholder { color: #4a5568; }

    .country-option {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.14s;
      font-size: 13.5px; color: #c8d0dc;
    }
    .country-option:hover { background: #252e42; }
    .country-option .flag { font-size: 16px; }
    .country-option .name { flex: 1; font-size: 13px; color: #9aa5b8; }
    .country-option .dial { font-weight: 600; color: #e8edf4; font-size: 13px; }

    .phone-input-wrapper {
      flex: 1;
      position: relative; display: flex; align-items: center;
    }
    .phone-input-wrapper .phone-icon {
      position: absolute; left: 13px;
      color: #4a5568; display: flex; align-items: center; pointer-events: none;
    }
    .phone-input-wrapper input {
      width: 100%;
      padding: 12px 13px 12px 40px;
      background: #1a2030;
      border: 1.5px solid #2a3245;
      border-radius: 10px;
      color: #e8edf4;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; outline: none;
      transition: border-color 0.18s;
    }
    .phone-input-wrapper input::placeholder { color: #4a5568; }
    .phone-input-wrapper input:focus { border-color: #ff6a42; }
      position: fixed; bottom: 24px; right: 24px; z-index: 10;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      color: #5a6478; font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.18s;
    }
    .help-btn:hover { background: rgba(255,255,255,0.11); }
  </style>
</head>
<body>

  <div class="bg-canvas" aria-hidden="true">
    <canvas id="sq-canvas"></canvas>
  </div>

  <!-- ══ SIGN UP ══ -->
  <div class="page active" id="signup-page">
    <div class="card">
      <div class="brand">
        <span class="brand-name">API<span class="gap"> </span><span class="insights">Insights</span></span>
        <p class="brand-tagline">Monitor, analyse, and act on your API data</p>
      </div>
      <div class="card-header" style="display:none;"></div>
      <div class="social-row">
        <button class="social-btn">
          <svg class="g-icon" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="social-btn">
          <svg class="g-icon" viewBox="0 0 24 24" fill="white">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          Apple
        </button>
      </div>
      <div class="divider"><span>or continue with email</span></div>
      <div class="fields">
        <div class="field">
          <div style="display:flex; gap:10px;">
            <div style="flex:1;">
              <div class="field-label"><label>First Name</label></div>
              <div class="input-wrapper">
                <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                <input type="text" placeholder="John"/>
              </div>
            </div>
            <div style="flex:1;">
              <div class="field-label"><label>Last Name</label></div>
              <div class="input-wrapper">
                <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                <input type="text" placeholder="Doe"/>
              </div>
            </div>
          </div>
        </div>
        <div class="field">
          <div class="field-label"><label>Email Address</label></div>
          <div class="input-wrapper">
            <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
            <input type="email" placeholder="john@example.com"/>
          </div>
        </div>
        <div class="field">
          <div class="field-label"><label>Phone Number</label></div>
          <div class="phone-row">
            <!-- Country code dropdown -->
            <div class="country-select-wrapper" id="cs-wrapper">
              <div class="country-trigger" id="cs-trigger" onclick="toggleDropdown()">
                <span class="flag" id="cs-flag">🇺🇸</span>
                <span class="code" id="cs-code">+1</span>
                <span class="chevron">▼</span>
              </div>
              <div class="country-dropdown" id="cs-dropdown">
                <input class="country-search" type="text" placeholder="Search country…" oninput="filterCountries(this.value)" onclick="event.stopPropagation()"/>
                <div id="cs-list"></div>
              </div>
            </div>
            <!-- Phone number input -->
            <div class="phone-input-wrapper">
              <span class="phone-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.94-.94a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
              </span>
              <input type="tel" id="phone-input" placeholder="555 000 0000"/>
            </div>
          </div>
        </div>
        <div class="field">
          <div class="field-label"><label>Password</label></div>
          <div class="input-wrapper">
            <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="su-pw" placeholder="••••••••"/>
            <button class="eye-btn" onclick="togglePw('su-pw',this)" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
        <div class="field">
          <div class="field-label"><label>Confirm Password</label></div>
          <div class="input-wrapper">
            <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="su-cpw" placeholder="••••••••"/>
            <button class="eye-btn" onclick="togglePw('su-cpw',this)" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
      </div>
      <button class="cta-btn">Get Started →</button>
      <p class="switch-text">Already have an account? <span class="switch-link" onclick="showPage('signin-page')">Sign in</span></p>
    </div>
    <div class="footer-links"><a href="#">Terms</a><a href="#">Privacy Policy</a></div>
  </div>

        <span class="brand-name">API<span class="gap"> </span><span class="insights">Insights</span></span>
        <p class="brand-tagline">Sign in to your API Insights dashboard</p>

      <div class="card-header" style="display:none;"></div>

          Apple

      </div>
      <div class="divider"><span>or continue with email</span></div>
      <div class="fields">
        <div class="field">

          <div class="input-wrapper">
            <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
            <input type="email" placeholder="john@example.com"/>
          </div>
        </div>
        <div class="field">
          <div class="field-label">
            <label>Password</label>
            <a class="forgot-link" href="#">Forgot password?</a>
          </div>
          <div class="input-wrapper">
            <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="si-pw" placeholder="••••••••"/>
            <button class="eye-btn" onclick="togglePw('si-pw',this)" type="button"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
      </div>
      <button class="cta-btn">Sign In →</button>

  <script>

    /* ── Country code dropdown ── */
    const COUNTRIES = [

    ];

    let filteredCountries = [...COUNTRIES];

    function renderList(list) {
      const el = document.getElementById('cs-list');
      el.innerHTML = list.map((c, i) =>
        `<div class="country-option" onclick="selectCountry(${COUNTRIES.indexOf(c)})">
          <span class="flag">${c.flag}</span>
          <span class="name">${c.name}</span>
          <span class="dial">${c.dial}</span>
        </div>`
      ).join('');
    }

    function filterCountries(q) {
      filteredCountries = q
        ? COUNTRIES.filter(c => c.name.toLowerCase().includes(q.toLowerCase()) || c.dial.includes(q))
        : [...COUNTRIES];
      renderList(filteredCountries);
    }

    function selectCountry(idx) {
      const c = COUNTRIES[idx];
      document.getElementById('cs-flag').textContent = c.flag;
      document.getElementById('cs-code').textContent = c.dial;
      closeDropdown();
    }

    function toggleDropdown() {
      const trigger  = document.getElementById('cs-trigger');
      const dropdown = document.getElementById('cs-dropdown');
      const isOpen   = dropdown.classList.contains('open');
      if (isOpen) { closeDropdown(); } else {
        trigger.classList.add('open');
        dropdown.classList.add('open');
        renderList(COUNTRIES);
        dropdown.querySelector('.country-search').value = '';
        dropdown.querySelector('.country-search').focus();
      }
    }

    function closeDropdown() {
      document.getElementById('cs-trigger').classList.remove('open');
      document.getElementById('cs-dropdown').classList.remove('open');
    }

    document.addEventListener('click', e => {
      const wrapper = document.getElementById('cs-wrapper');
      if (wrapper && !wrapper.contains(e.target)) closeDropdown();
    });
    (function () {
      const canvas = document.getElementById('sq-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H, squares;
      let mouse = { x: -9999, y: -9999 };

      const FLEE_DIST = 120;
      const COUNT     = 130;

      /* Colour palette — gradient family + accent shades */
      const COLOURS = [
        { r: 255, g:  92, b:  56 }, // #ff5c38 coral
        { r: 255, g: 154, b: 108 }, // #ff9a6c light coral
        { r: 255, g:  61, b: 110 }, // #ff3d6e rose
        { r: 255, g: 122, b:  50 }, // orange
        { r: 255, g: 190, b:  55 }, // amber/yellow
        { r: 255, g:  75, b:  75 }, // red
        { r: 200, g:  75, b: 200 }, // purple
        { r: 255, g: 200, b:  70 }, // gold
        { r: 255, g: 130, b:  65 }, // peach-orange
        { r: 180, g:  80, b: 220 }, // violet
      ];

      function rnd(a, b) { return a + Math.random() * (b - a); }
      function pickCol()  { return COLOURS[Math.floor(Math.random() * COLOURS.length)]; }

      function makeSquare(cx, cy) {
        const col    = pickCol();
        const filled = Math.random() < 0.45;
        const roll   = Math.random();
        const size   =
          roll < 0.28 ? rnd(3, 7)   :  // tiny
          roll < 0.62 ? rnd(8, 16)  :  // small
          roll < 0.86 ? rnd(18, 28) :  // medium
                        rnd(30, 46);   // large (rare)
        return {
          bx: cx, by: cy,          // base (grid) position
          x: cx,  y: cy,           // rendered position
          vx: rnd(-0.022, 0.022),
          vy: rnd(-0.018, 0.018),
          fx: 0, fy: 0,
          size, col, filled,
          lineW:     size < 10 ? rnd(0.8, 1.4) : size < 22 ? rnd(1.1, 1.9) : rnd(1.5, 2.6),
          life:      Math.random(),
          lifeSpeed: size < 12 ? rnd(0.00018, 0.00038) : size < 25 ? rnd(0.00010, 0.00022) : rnd(0.00006, 0.00013),
          peakAlpha: rnd(0.38, 0.78),
          phaseIn:   rnd(0.10, 0.20),
          phaseOut:  rnd(0.72, 0.86),
        };
      }

      function initSquares() {
        squares = [];
        const cols  = Math.round(Math.sqrt(COUNT * (W / H)));
        const rows  = Math.ceil(COUNT / cols);
        const cellW = W / cols;
        const cellH = H / rows;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            if (squares.length >= COUNT) break;
            const cx = c * cellW + rnd(cellW * 0.05, cellW * 0.95);
            const cy = r * cellH + rnd(cellH * 0.05, cellH * 0.95);
            squares.push(makeSquare(cx, cy));
          }
        }
      }

      function resize() {
        W = canvas.width  = canvas.offsetWidth;
        H = canvas.height = canvas.offsetHeight;
        initSquares();
      }

      function easeIn(t)  { return t * t; }
      function easeOut(t) { return 1 - (1-t)*(1-t); }

      let last = 0;
      function draw(ts) {
        const dt = Math.min(ts - last, 50); last = ts;
        ctx.clearRect(0, 0, W, H);

        squares.forEach(sq => {
          /* Lifecycle */
          sq.life += sq.lifeSpeed * dt;
          if (sq.life >= 1) { sq.life = 0; return; }

          let alpha;
          if      (sq.life < sq.phaseIn)   alpha = easeOut(sq.life / sq.phaseIn) * sq.peakAlpha;
          else if (sq.life < sq.phaseOut)   alpha = sq.peakAlpha;
          else {
            const t = (sq.life - sq.phaseOut) / (1 - sq.phaseOut);
            alpha = (1 - easeIn(t)) * sq.peakAlpha;
          }
          if (alpha < 0.01) return;

          /* Drift base position */
          sq.bx += sq.vx * dt * 0.5;
          sq.by += sq.vy * dt * 0.5;
          const pad = sq.size + 12;
          if (sq.bx < -pad)    sq.bx = W + pad;
          if (sq.bx > W + pad) sq.bx = -pad;
          if (sq.by < -pad)    sq.by = H + pad;
          if (sq.by > H + pad) sq.by = -pad;

          /* Flee */
          const cdx = sq.bx - mouse.x, cdy = sq.by - mouse.y;
          const cd  = Math.sqrt(cdx*cdx + cdy*cdy);
          if (cd < FLEE_DIST && cd > 0) {
            const str = (1 - cd / FLEE_DIST) * 7.0;
            sq.fx += (cdx / cd) * str * 0.16;
            sq.fy += (cdy / cd) * str * 0.16;
          }
          sq.fx *= 0.87;
          sq.fy *= 0.87;

          sq.x = sq.bx + sq.fx;
          sq.y = sq.by + sq.fy;

          /* Draw */
          const h = sq.size / 2;
          const c = sq.col;
          ctx.globalAlpha = alpha;

          if (sq.filled) {
            ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
            ctx.fillRect(sq.x - h, sq.y - h, sq.size, sq.size);
          } else {
            ctx.strokeStyle = `rgb(${c.r},${c.g},${c.b})`;
            ctx.lineWidth   = sq.lineW;
            ctx.strokeRect(sq.x - h, sq.y - h, sq.size, sq.size);
          }
        });

        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }

      window.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
      });
      window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
      window.addEventListener('resize', resize);
      resize();
      requestAnimationFrame(draw);
    })();
  </script>
